name = "spectrum-og"
main = "src/index.mjs"
compatibility_date = "2026-01-01"

# The deployed site this worker fronts (also where /tokenlist.json lives).
[vars]
SITE_ORIGIN = "https://your-spectrum-site.example"

# Bundle the fonts + resvg wasm as raw bytes.
[[rules]]
type = "Data"
globs = ["**/*.ttf"]
fallthrough = true

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true
